version = 1

[grid]
cell_size = 2.0
origin = [0.0, 0.0, 0.0]

[[kind]]
name = "tank"
default_mesh_asset = "trust-twin/components/tank.gltf"
primitive = "box"
material = "#64748b"
scale = [1.2, 2.0, 1.2]

[[kind.ports]]
name = "inlet"
domain = "water"
direction = "in"
size = "DN50"
origin = [-0.75, 0.0, 0.0]
axis = [-1.0, 0.0, 0.0]

[[kind.ports]]
name = "outlet"
domain = "water"
direction = "out"
size = "DN50"
origin = [0.75, 0.0, 0.0]
axis = [1.0, 0.0, 0.0]

[[kind.signals]]
name = "level"
node_suffix = "level"
property = "transform.scale.y"
binding_scale = { min = 0.0, max = 100.0, output_min = 0.05, output_max = 1.0 }

[kind.signals.visual_node]
primitive = "box"
label_suffix = "level"
position_offset = [0.0, -0.4, 0.0]
scale = [1.0, 0.2, 1.0]
material = "#38bdf8"
opacity = 0.85

[[kind]]

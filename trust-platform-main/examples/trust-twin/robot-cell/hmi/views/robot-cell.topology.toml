[metadata]
asset_state = "procedural_robot"
design_decision = "Q-H"
description = "Canonical robot-cell digital twin with PLC-driven pick-and-place motion."

[grid]
cell_size = 2.0
origin = [0.0, 0.0, 0.0]

[[components]]
id = "ROBOT-1"
kind = "robot_arm"
at = { grid = "B1" }

[[components]]
id = "PICKUP-1"
kind = "pickup_zone"
at = { grid = "A1" }

[[components]]
id = "BOX-1"
kind = "workpiece"
at = { attach_to = "PICKUP-1.top", placement = "top_center" }

[[components]]
id = "GRIPPER-1"
kind = "gripper"
at = { attach_to = "ROBOT-1.tool", placement = "mount" }

[[components]]
id = "DROP-1"
kind = "drop_zone"
at = { grid = "A3" }

[[components]]
id = "LIGHT-1"
kind = "safety_light"
at = { right_of = "ROBOT-1" }

[[bindings]]
component = "ROBOT-1"
signal = "shoulder_angle"
source = "Main.RobotShoulderAngle"
access = "read"

[[bindings]]
component = "ROBOT-1"
signal = "elbow_angle"
source = "Main.RobotElbowAngle"
access = "read"

[[bindings]]
component = "ROBOT-1"
signal = "wrist_angle"
source = "Main.RobotWristAngle"
access = "read"

[[bindings]]
component = "GRIPPER-1"
signal = "open_left"
source = "Main.RobotGripperOpen"
access = "read"

[[bindings]]
component = "GRIPPER-1"
signal = "open_right"
source = "Main.RobotGripperOpen"
access = "read"

[[bindings]]
component = "GRIPPER-1"
signal = "x"
source = "Main.RobotGripperX"
access = "read"

[[bindings]]
component = "GRIPPER-1"
signal = "y"
source = "Main.RobotGripperY"
access = "read"

[[bindings]]
component = "GRIPPER-1"
signal = "z"
source = "Main.RobotGripperZ"
access = "read"

[[bindings]]
component = "LIGHT-1"
signal = "state"
source = "Main.RobotStatusLight"
access = "read"

[[bindings]]
component = "BOX-1"
signal = "x"
source = "Main.RobotBoxX"
access = "read"

[[bindings]]
component = "BOX-1"
signal = "y"
source = "Main.RobotBoxY"
access = "read"

[[bindings]]
component = "BOX-1"
signal = "z"
source = "Main.RobotBoxZ"
access = "read"

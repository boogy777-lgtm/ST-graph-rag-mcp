[metadata]
asset_state = "procedural_robot"
design_decision = "Q-H"

[[node]]
id = "cell.floor"
primitive = "grid"
label = "Robot cell floor"

[node.transform]
position = [0.0, -0.02, 0.0]
scale = [3.2, 1.0, 2.2]

[node.material]
base_color = "#334155"
opacity = 0.55

[[node]]
id = "zone.pickup"
primitive = "plate"
label = "Pickup zone"

[node.transform]
position = [-1.4, 0.03, 0.0]
scale = [0.75, 0.08, 0.75]

[node.material]
base_color = "#0ea5e9"
opacity = 0.72

[[node]]
id = "zone.drop"
primitive = "plate"
label = "Drop zone"

[node.transform]
position = [1.4, 0.03, 0.0]
scale = [0.75, 0.08, 0.75]

[node.material]
base_color = "#f59e0b"
opacity = 0.72

[[node]]
id = "robot.base"
primitive = "box"
label = "ROBOT-1 base"

[node.transform]
position = [0.0, 0.25, 0.0]
scale = [0.7, 0.5, 0.7]

[node.material]
base_color = "#475569"

[[node]]
id = "robot.shoulder"
primitive = "box"
label = "ROBOT-1 shoulder link"

[node.transform]
position = [-0.38, 0.90, 0.0]
rotation = [0.0, 0.0, -0.60]
scale = [1.15, 0.22, 0.26]

[node.material]
base_color = "#2563eb"

[[node]]
id = "robot.elbow"
primitive = "box"
label = "ROBOT-1 elbow link"

[node.transform]
position = [0.42, 1.28, 0.0]
rotation = [0.0, 0.0, 0.25]
scale = [1.0, 0.18, 0.22]

[node.material]
base_color = "#38bdf8"

[[node]]
id = "robot.wrist"
primitive = "box"
label = "ROBOT-1 wrist link"

[node.transform]
position = [1.08, 1.02, 0.0]
rotation = [0.0, 0.0, 0.35]
scale = [0.55, 0.16, 0.18]

[node.material]
base_color = "#22c55e"

[[node]]
id = "robot.gripper"
primitive = "box"
label = "ROBOT-1 gripper bridge"

[node.transform]
position = [1.35, 0.80, 0.0]
scale = [0.16, 0.18, 0.36]

[node.material]
base_color = "#f8fafc"

[[node]]
id = "robot.gripper.left"
primitive = "box"
label = "ROBOT-1 gripper left jaw"

[node.transform]
position = [1.50, 0.30, 0.18]
scale = [0.12, 0.46, 0.10]

[node.material]
base_color = "#e2e8f0"

[[node]]
id = "robot.gripper.right"
primitive = "box"
label = "ROBOT-1 gripper right jaw"

[node.transform]
position = [1.50, -0.30, -0.18]
scale = [0.12, 0.46, 0.10]

[node.material]
base_color = "#e2e8f0"

[[node]]
id = "box.workpiece"
primitive = "box"
label = "BOX-1 workpiece"

[node.transform]
position = [-1.40, 0.35, 0.0]
scale = [0.36, 0.36, 0.36]

[node.material]
base_color = "#f97316"

[[node]]
id = "robot.status_light"
primitive = "box"
label = "ROBOT-1 enabled light"

[node.transform]
position = [-0.42, 0.78, 0.42]
scale = [0.18, 0.18, 0.18]

[node.material]
base_color = "#16a34a"
emissive = "#22c55e"

[[camera]]
id = "main"
position = [5.0, 4.0, 8.0]
target = [0.0, 0.8, 0.0]
fov_degrees = 45.0

[[light]]
id = "key"
kind = "directional"
position = [2.0, 5.0, 6.0]
color = "#ffffff"
intensity = 1.0

[[light]]
id = "fill"
kind = "point"
position = [-3.0, 3.0, 4.0]
color = "#dbeafe"
intensity = 0.6

[[bind3d]]
node = "robot.shoulder"
property = "transform.rotation.z"
source = "Main.RobotShoulderAngle"

[[bind3d]]
node = "robot.elbow"
property = "transform.rotation.z"
source = "Main.RobotElbowAngle"

[[bind3d]]
node = "robot.wrist"
property = "transform.rotation.z"
source = "Main.RobotWristAngle"

[[bind3d]]
node = "robot.gripper.left"
property = "transform.position.y"
source = "Main.RobotGripperOpen"
map = { "true" = "0.30", "false" = "0.18" }

[[bind3d]]
node = "robot.gripper.right"
property = "transform.position.y"
source = "Main.RobotGripperOpen"
map = { "true" = "-0.30", "false" = "-0.18" }

[[bind3d]]
node = "box.workpiece"
property = "transform.position.x"
source = "Main.RobotBoxX"

[[bind3d]]
node = "box.workpiece"
property = "transform.position.y"
source = "Main.RobotBoxY"

[[bind3d]]
node = "box.workpiece"
property = "transform.position.z"
source = "Main.RobotBoxZ"

[[bind3d]]
node = "robot.status_light"
property = "material.emissive"
source = "Main.RobotStatusLight"
map = { "true" = "#22c55e", "false" = "#f59e0b" }
